<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西南协作平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        header h1 { font-size: 28px; margin-bottom: 8px; }
        header p { opacity: 0.85; font-size: 15px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            border-color: #1a73e8;
            transform: translateY(-2px);
        }
        .card-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .card h3 { font-size: 17px; margin-bottom: 8px; }
        .card p { font-size: 13px; color: #666; line-height: 1.5; }
        .card .tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
        .card .tag {
            font-size: 11px; padding: 2px 8px;
            border-radius: 10px; background: #e8f0fe; color: #1a73e8;
        }
        .status-bar {
            background: white;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }
        footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <header>
        <h1>西南协作平台</h1>
        <p>标讯采集 · 产品选型 · 协同工具</p>
    </header>
    <div class="container">
        <div class="status-bar">
            <span class="status-dot"></span>
            所有服务运行正常
        </div>
        <div class="grid">
            <a href="http://10.2.37.237:8088/" target="_blank" style="text-decoration: none; color: inherit;">
                <div class="card">
                    <div class="card-icon" style="background: #e3f2fd; color: #1565c0;">📋</div>
                    <h3>标讯采集平台</h3>
                    <p>千里马招标信息自动采集、智能分发、钉钉推送。支持多地区多行业筛选。</p>
                    <div class="tags">
                        <span class="tag">BidPool</span>
                        <span class="tag">爬虫</span>
                        <span class="tag">钉钉</span>
                    </div>
                </div>
            </a>
            <a href="/ps/" target="_blank" style="text-decoration: none; color: inherit;">
                <div class="card">
                    <div class="card-icon" style="background: #f3e5f5; color: #7b1fa2;">🤖</div>
                    <h3>产品选型智能体</h3>
                    <p>安全产品智能推荐，支持对话和表单双模式，精准匹配客户需求。</p>
                    <div class="tags">
                        <span class="tag">AI</span>
                        <span class="tag">选型</span>
                        <span class="tag">推荐</span>
                    </div>
                </div>
            </a>
            <div class="card" style="opacity: 0.5; cursor: default; border-color: transparent;">
                <div class="card-icon" style="background: #f5f5f5; color: #999;">🔧</div>
                <h3>更多模块即将上线</h3>
                <p>项目管理、客户管理、知识库……持续扩展中。</p>
                <div class="tags">
                    <span class="tag">敬请期待</span>
                </div>
            </div>
        </div>
    </div>
    <footer>
        西南协作平台 &copy; 2026
    </footer>
</body>
</html>
