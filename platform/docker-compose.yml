services:
  # ========== 统一网关 + 平台门户 ==========
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: platform-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - product-selector
    networks:
      - platform-net

  # ========== 产品选型智能体 API ==========
  product-selector:
    build:
      context: ./product-selector
      dockerfile: Dockerfile
    container_name: platform-ps
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    networks:
      - platform-net

  # ========== 产品选型智能体 Streamlit UI ==========
  product-selector-ui:
    build:
      context: ./product-selector
      dockerfile: Dockerfile.streamlit
    container_name: platform-ps-ui
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge
