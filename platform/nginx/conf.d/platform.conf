server {
    listen 80;
    server_name _;
    charset utf-8;

    # 平台门户首页
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 产品选型 API（/ps-api/health → /api/health）
    location /ps-api/ {
        rewrite ^/ps-api/(.*) /api/$1 break;
        proxy_pass http://product-selector:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # 产品选型前端（Streamlit）
    location /ps/ {
        proxy_pass http://product-selector-ui:8501/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ========== BidPool 集成（只读代理到 10.2.37.237） ==========
    location /api/v1/ {
        proxy_pass http://10.2.37.237:8088/api/v1/;
        proxy_set_header Host 10.2.37.237:8088;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization "Basic YWRtaW46YmlkcG9vbEAyMDI2";
        proxy_read_timeout 60s;
    }

    # 健康检查
    location /health {
        return 200 "OK";
    }
}
